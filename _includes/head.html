<!DOCTYPE html>
<html lang="en"
      x-data="{darkMode: localStorage.getItem('darkMode') || localStorage.setItem('darkMode', 'system')}"
      x-init="$watch('darkMode', val => localStorage.setItem('darkMode', val))"
      x-bind:class="{'dark': darkMode === 'dark' || (darkMode === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)}"
      >
    <head>
        {% if jekyll.environment == "production" and site.google_analytics %}
          {% include google-analytics.html %}
        {% endif %}
        <meta charset="UTF-8">
        <link rel="preconnect" href="https://res.cloudinary.com" crossorigin>

        <!-- Self-hosted fonts: preload critical weights; @font-face lives in dist-style.css -->
        <link rel="preload" as="font" type="font/woff2" crossorigin href="/assets/fonts/noto-sans-400.woff2">
        <link rel="preload" as="font" type="font/woff2" crossorigin href="/assets/fonts/noto-sans-700.woff2">
        <link rel="preload" as="font" type="font/woff2" crossorigin href="/assets/fonts/noto-serif-400.woff2">

        <link rel="stylesheet" href="/assets/dist-style.css">
        <link rel="stylesheet" x-bind:href="'/assets/css/igorpro.' + (darkMode == 'dark' || window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') + '.css'" >

        {% assign hero_src = page.heroImage | default: page.image %}
        {% if hero_src %}
        <link rel="preload" as="image" fetchpriority="high" href="{{ hero_src | cloudinary: 'hero' }}">
        {% endif %}
        <script src="/assets/js/alpine.min.js" defer></script>
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
        <link rel="icon" type="image/svg+xml" x-bind:href="'/assets/favicons/' + (darkMode == 'dark' || window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') + '.svg'">

        {% seo %}
        {% feed_meta %}
    </head>
<body x-data="{atTop: true}" >
<script>
    const selectedTheme = localStorage.getItem('darkMode');
    const element = document.getElementsByTagName( 'html' );
    if(element)
        element[0].classList[selectedTheme === 'dark' || (selectedTheme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches) ? 'add' : 'remove']('dark');
</script>
